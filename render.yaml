services:
  # Backend API
  - type: web
    name: bailpro-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bailpro-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://bailpro-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: bailpro-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://bailpro-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: bailpro-db
    plan: free
    databaseName: bailpro
    user: bailpro
