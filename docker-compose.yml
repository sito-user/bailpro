version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bailpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bailpro
      POSTGRES_PASSWORD: bailpro_dev
      POSTGRES_DB: bailpro_dev
    ports:
      - '5435:5432'
    volumes:
      - bailpro_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bailpro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bailpro.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  bailpro_pgdata:
